<html>
    <head>
        <title>Add Member</title>
        <link rel="stylesheet" href="../../css/global.css" />
        <link rel="stylesheet" href="../../css/add-member.css" />
        <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet" />
        <script defer src="../../js/components/top-navbar.js"></script>
        <script defer src="../../js/pages/add-member.js"></script>
        <script defer src="../../js/components/bottom-navbar.js"></script>
    </head>
    <body data-navbar-type="manage-view-pages" data-group-id="1" data-group-name="Li Residence" data-page-title="Add Member" data-current-view="manage-view">
        <div id="top-navbar"></div>
        <div class="page-content">
            <form id="add-member-form">
                <div class="form-comp">
                    <p class="comp-title">Email</p>
                    <input type="text" id="email" placeholder="Email" />
                </div>
                <div class="confirmationMsg">
                    <p id="confirmationMsg"></p>
                </div>
                <input type="button" class="submit-button" value="Add Member" onclick="addMember()" />
            </form>
            <div class="invite-code-container">
                <button id="invite-code-button" onclick="copyInviteCode()">
                    <span class="invite-label"> Copy Invite Code:</span>
                    <span class="invite-code" id="invite-code-text"></span>
                </button>
            </div>
        </div>
        <div id="bottom-navbar"></div>
    </body>
</html>
