<html>
    <head>
        <title>Create Group</title>
        <link rel="stylesheet" href="../css/global.css" />
        <link rel="stylesheet" href="../css/create-join-group.css" />
        <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet" />
        <script src="../js/api/auth.js"></script>
        <script src="../js/pages/create-group.js"></script>
    </head>
    <body class="center-page">
        <div class="title-row">
            <a href="create-join-group.html" class="navbar-icon">
                <img class="back-icon" src="../assets/back-arrow.png" alt="Back" />
            </a>
            <h2 id="page-title">Create Group</h2>
            <div class="spacer"></div>
        </div>
        <form id="create-group-form">
            <div class="form-comp">
                <p class="comp-title">Group Name</p>
                <input type="text" id="group-name" placeholder="Group Name" />
            </div>
            <div class="error-msg">
                <p id="error-msg"></p>
            </div>
            <input type="button" class="submit-button" value="Create Group" onclick="createGroup()" />
        </form>
    </body>
</html>
