<html>
    <head>
        <title>Task View</title>
        <link rel="stylesheet" href="../css/global.css" />
        <link rel="stylesheet" href="../css/task-view.css" />        
        <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet" />
    </head>
    <body class="center-page">
        <div class="title-row">
            <a onclick="window.history.back()" class="navbar-icon">
                <img class="back-icon" src="../assets/back-arrow.png" alt="Back" />
            </a>
            <h2 id="page-title">Task View</h2>
            <div class="spacer"></div>
        </div>
        <div class="task-view-details">
            <form id="login-form">
                <div class="form-comp">
                    <p class="comp-title">Email</p>
                    <input type="email" id="email" placeholder="Email" />
                </div>
                <div class="form-comp">
                    <p class="comp-title">Password</p>
                    <input type="password" id="password" placeholder="Password" /><br />
                </div>
                <input type="button" class="submit-button" value="Log In" onclick="login()" />
            </form>
        </div>
    </body>
</html>
