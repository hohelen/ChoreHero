<html>
    <head>
        <title>Task View</title>
        <link rel="stylesheet" href="../css/global.css" />
        <link rel="stylesheet" href="../css/task-view.css" />
        <link rel="stylesheet" href="../css/popup.css" />
        <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet" />
        <script src="../js/api/auth.js"></script>
        <script src="../js/components/popup.js"></script>
        <script src="../js/pages/task-view.js"></script>
        <script defer src="../js/pages/task-view.js"></script>
    </head>
    <body class="center-page">
        <div class="title-row">
            <a onclick="window.history.back()" class="navbar-icon">
                <img class="back-icon" src="../assets/back-arrow.png" alt="Back" />
            </a>
            <h2 id="page-title">Task View</h2>
            <button class="delete-task-btn admin-only"><img class="delete-task-icon" src="../assets/delete-task.png" /></button>
            <div class="spacer member-only"></div>
        </div>
        <div class="task-view-details">
            <form id="task-view-form">
                <div class="form-comp">
                    <p class="comp-title">Group</p>
                    <input type="text" id="group" placeholder="Li Residence" disabled />
                </div>
                <div class="form-comp">
                    <p class="comp-title">Assignee</p>
                    <input type="text" id="assignee" placeholder="Meiqi Li" disabled /><br />
                </div>
                <div class="form-comp">
                    <p class="comp-title">Task</p>
                    <input type="text" id="task" placeholder="Clean garage" disabled /><br />
                </div>
                <div class="form-comp">
                    <p class="comp-title">Description</p>
                    <textarea id="description" rows="1" placeholder="Sweep leaves out of the garage" disabled></textarea><br />
                </div>
                <div class="form-comp">
                    <p class="comp-title">Due Date</p>
                    <input type="text" id="due-date" placeholder="2/5/2026" disabled /><br />
                </div>
                <div class="form-comp">
                    <p class="comp-title">Status</p>
                    <input type="text" id="status" placeholder="Incomplete" disabled /><br />
                    <button id="status-button" onclick="updateStatus()">Incomplete</button>
                </div>
            </form>
        </div>
        <div class="popup"></div>
    </body>
</html>
